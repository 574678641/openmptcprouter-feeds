name: Build mptcp-bpf-rr Debian package

on:
  push:
    branches: [develop, master]
    paths:
      - 'mptcp-bpf-rr/**'
  workflow_dispatch:

jobs:
  build-deb:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts clang libbpf-dev

      - name: Build .deb
        working-directory: mptcp-bpf-rr
        run: dpkg-buildpackage -us -uc -b -Zxz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mptcp-bpf-rr_${{ matrix.arch }}
          path: mptcp-bpf-rr_*.deb

  release:
    name: Create release
    needs: build-deb
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/mptcp-bpf-rr-v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: mptcp-bpf-rr_*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
